                        <h1 id="枚举和模式匹配"><a class="header" href="#枚举和模式匹配">枚举和模式匹配</a></h1>
<p><a href="https://github.com/rust-lang/book/blob/602a0d2e898f5e4ff030eac0b457755a10e0be1e/src/ch06-00-enums.md">ch06-00-enums.md</a></p>
<p>本章我们会介绍<strong>枚举</strong>（<em>enumerations</em>），也叫作 <em>enums</em>。枚举让你可以通过列举某个类型所有可能的 <strong>变体</strong>（<em>variants</em>）来定义这个类型。首先，我们会定义并使用一个枚举，展示它如何把含义和数据一起编码进去。接着，我们会探索一个特别有用的枚举 <code>Option</code>，它表达的是一个值要么是某个值，要么什么都不是。然后，我们会看到 <code>match</code> 表达式中的模式匹配如何让我们针对枚举的不同值运行不同的代码。最后，我们会介绍 <code>if let</code>，这是在代码中处理枚举时另一种简洁方便的惯用写法。</p>
