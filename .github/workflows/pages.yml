name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  MDBOOK_VERSION: 0.4.51
  MDBOOK_QUIZ_VERSION: 0.4.0
  AQUASCOPE_VERSION: 0.3.8
  AQUASCOPE_TOOLCHAIN: nightly-2024-12-15

jobs:
  build:
    name: Build Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Update rustup
        run: rustup self update

      - name: Install Rust
        run: |
          rustup set profile minimal
          rustup toolchain install 1.85 -c rust-docs
          rustup default 1.85

      - name: Install Depot
        run: curl https://raw.githubusercontent.com/cognitive-engineering-lab/depot/main/scripts/install.sh | sh

      - name: Install Aquascope toolchain
        run: |
          rustup toolchain install "${AQUASCOPE_TOOLCHAIN}" -c rust-src,rustc-dev,llvm-tools-preview,miri
          cargo +"${AQUASCOPE_TOOLCHAIN}" miri setup
          echo "LD_LIBRARY_PATH=$($(rustup which --toolchain "${AQUASCOPE_TOOLCHAIN}" rustc) --print target-libdir)" >> "${GITHUB_ENV}"

      - name: Install build binaries
        run: |
          mkdir -p bin
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=bin
          curl -sSL "https://github.com/cognitive-engineering-lab/mdbook-quiz/releases/download/v${MDBOOK_QUIZ_VERSION}/mdbook-quiz_x86_64-unknown-linux-gnu_full.tar.gz" \
            | tar -xz --directory=bin
          curl -sSL "https://github.com/cognitive-engineering-lab/aquascope/releases/download/v${AQUASCOPE_VERSION}/aquascope-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz --directory=bin
          patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 bin/mdbook-aquascope bin/cargo-aquascope bin/aquascope-driver
          echo "$(pwd)/bin" >> "${GITHUB_PATH}"

      - name: Report versions
        run: |
          rustup --version
          rustc -Vv
          mdbook --version
          mdbook-quiz --version
          mdbook-aquascope --version

      - name: Build site
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
