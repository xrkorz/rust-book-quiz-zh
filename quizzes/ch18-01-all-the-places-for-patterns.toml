type = "Tracing"
prompt.program = """
fn main() {
    let mut v = vec![(1, 2), (3, 4)].into_iter();
    let mut sum = 0;
    while let Some(t) = v.next() {
        let (_, n) = t;
        sum += n;
    }
    println!("{sum}");
}
"""
answer.doesCompile = true
answer.stdout = "6"
