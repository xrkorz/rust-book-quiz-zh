[[questions]]
id = "1ec0098c-c5dc-46de-a889-b6659c0af757"
type = "MultipleChoice"
prompt.prompt = """
假设你正在编写一个具有以下规格的函数：

> `round_all` 接受一个浮点数列表作为输入，并将每个数字原地舍入到最近的整数。

下列哪项是实现该规格的函数最合适的类型签名？
"""
answer.answer = """
```
fn round_all(v: &mut Vec<f32>);
```
"""
prompt.distractors = [
"""
```
fn round_all(v: &Vec<f32>) -> Vec<f32>;
```
""",
"""
```
fn round_all(v: Vec<f32>);
```
""",
"""
```
fn round_all(v: &Vec<f32>);
```
"""
]
context = """
该规格要求原地修改输入，因此最合适的类型签名应接受一个对输入的可变引用。
不可变引用或获取向量所有权对于该规格而言都是不恰当的。
"""

[[questions]]
id = "f8ca5ab2-0e5d-4c0d-bca2-99e6763ba9c5"
type = "MultipleChoice"
prompt.prompt = """
假设你正在编写一个具有以下规格的函数：

> `find_contains` 接受一个字符串集合和一个目标子串作为输入。
> 它返回集合中所有包含目标子串的字符串列表。

下列哪项是实现该规格的函数最合适的类型签名？
"""
answer.answer = """
```
fn find_contains(haystack: &[String], needle: &str) -> Vec<&String>;
```
"""
prompt.distractors = [
"""
```
fn find_contains(haystack: &Vec<String>, needle: String) -> Vec<String>;
```
""",
"""
```
fn find_contains(haystack: &[String], needle: &str) -> Vec<String>;
```
""",
"""
```
fn find_contains(haystack: &Vec<String>, needle: &str) -> &[String];
```
"""
]
context = """
对于 `haystack`，切片类型 `&[String]` 比 `&Vec<String>` 能接受更多种类的输入，因此更优。
对于 `needle`，目标子串不需要在堆上分配，所以 `&str` 优于 `String`。
对于返回类型，`Vec<String>` 不理想，因为它需要克隆输入字符串。
`&[String]` 不理想，因为它只能返回输入的连续子序列。
`Vec<&String>` 最为合适，因为它只承担分配向量的开销，而不需要复制字符串本身。
"""

[[questions]]
id = "868a4edf-16f0-4191-8aed-835c812b8b25"
type = "MultipleChoice"
prompt.prompt = """
Rust 通常不允许对同一数组进行多个可变访问，即使这些访问是不相交的。
例如，以下函数无法编译：

```
fn main() {
  let mut v = vec![0, 1, 2, 3];
  let (r0, r1) = (&mut v[0..2], &mut v[2..4]);
  r0[0] += 1;
  r1[0] += 1;
}
```

然而，Rust 标准库提供了 `slice::split_at_mut` 函数，它确实允许这种功能：

```
fn main() {
  let mut v = vec![0, 1, 2, 3];
  let (r0, r1) = v.split_at_mut(2);
  r0[0] += 1;
  r1[0] += 1;
}
```

下列哪项最好地描述了 `split_at_mut` 得以实现的原因？
"""
answer.answer = "`split_at_mut` 使用 unsafe 代码，通过原始指针绕过借用检查器"
prompt.distractors = [
"`split_at_mut` 是一个特殊的编译器原语，无法在语言内部实现",
"`split_at_mut` 使用 unsafe 代码来禁用借用检查器对可变引用安全性的检查",
"`split_at_mut` 调用了 C 语言库，该库无法被 Rust 分析"
]
context = """
正如 [第 4.3 节"修复安全程序：修改不同的数组元素"](ch04-03-fixing-ownership-errors.html#fixing-a-safe-program-mutating-different-array-elements) 中所讨论的，`split_at_mut` 等函数是通过 `unsafe` 特性实现的。
该特性并不会完全禁用借用检查器，而是允许使用特定的不安全特性，例如原始指针。
"""


