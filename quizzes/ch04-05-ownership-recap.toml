id = "ba32e57a-e5f2-42e4-8cfd-eb265990c690"
type = "MultipleChoice"
prompt.prompt = """
考察以下程序中的权限：

```aquascope,permissions,boundaries,stepper
#fn main() {
let s = String::new();
let s_ref = &s;`(focus,paths:*s_ref)`
#println!("{s_ref}");
#}
```

下列哪项最好地解释了 `*s_ref` 为何没有 @Perm{own}（own）权限？
"""
answer.answer = "所有权允许移动，而从引用中移动数据会导致双重释放"
prompt.distractors = [
  "所有权允许借用，而对 `*s_ref` 重新借用会导致双重释放",
  "所有权允许修改，而修改 `*s_ref` 会导致释放后使用",
  "所有权允许读取，而读取 `*s_ref` 会导致释放后使用"
]
context = """
@Perm{own} 权限代表对一个对象的所有权。一个对象只能有一个所有者，因此引用不能转移非可复制类型（如 `String`）的所有权，这一点至关重要。如果两个变量都认为自己拥有同一个字符串，它们就会都尝试释放它，从而导致双重释放。
"""

