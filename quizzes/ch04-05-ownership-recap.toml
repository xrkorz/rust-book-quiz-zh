id = "dcfd54f8-7fe6-4483-aefd-ea95ba5b5eb0"
type = "MultipleChoice"
prompt.prompt = """
函数 `transfer_string` 被借用检查器拒绝：

```rust
fn get_first(strs: &mut (String, String)) -> &mut String {
    &mut strs.0
}

fn get_second(strs: &mut (String, String)) -> &mut String {
    &mut strs.1
}

fn transfer_string(strs: &mut (String, String)) {
    let fst = get_first(strs);
    let snd = get_second(strs);
    fst.push_str(snd);
    snd.clear();
}
```

假设借用检查器没有拒绝此函数。
请判断是否存在某个输入，使得该函数在该输入上执行时会产生未定义行为。
"""
answer.answer = "此函数不可能导致未定义行为"
prompt.distractors = ["此函数可能导致未定义行为"]
context = """
借用检查器拒绝此函数，是因为它假设 `get_first` 和 `get_second` 可能都返回对元组任一分量的可变引用，因此 `fst` 和 `snd` 可能指向同一个值。但在该程序中它们始终是不同的，所以该函数实际上是安全的。
"""



