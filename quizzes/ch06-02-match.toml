type = "Tracing"
prompt.program = """
#[derive(Debug)]
enum Either {
  Left(usize),
  Right(String)
}

fn main() {
  let x = Either::Right(String::from("Hello world"));
  let value = match x {
    Either::Left(n) => n,
    Either::Right(s) => s.len()
  };
  println!("{x:?} {value}");
}
"""
answer.doesCompile = false
answer.lineNumber = 13
context = """
匹配分支 `Either::Right(s)` 移走了字段 `s`，因此 `x` 不能在 `println` 中使用。
"""


[[questions]]
id = "6e012d34-5c59-443e-85d9-385f0d7dee13"
type = "MultipleChoice"
prompt.prompt = """
考虑以下两种将无符号整数减两的函数实现：

```
fn decr_twice_v1(n: u32) -> Option<u32> {
  match n {
    0 => None,
    1 => None,
    n2 => Some(n2 - 2)
  }
}

fn decr_twice_v2(n: u32) -> Option<u32> {
  if n == 0 {
    None
  } else if n == 1 {
    None
  } else {
    Some(n - 2)
  }
}
```

这两个函数在以下输入上行为相同：
"""
answer.answer = "所有输入"
prompt.distractors = [ "没有任何输入", "部分但非全部输入" ]
context = """
`match` 和 `if` 在这里执行相同的功能。match 类似于一种专用的 `if`，用于检查被匹配对象的相等性。
"""
