type = "Tracing"
prompt.program = """
enum Location {
  Point(i32),
  Range(i32, i32)
}

fn main() {
  let l: Location = Location::Range(0, 5);
  let n = match l {
    Location::Point(_) => -1,
    Location::Range(_, 5) => 5,
    Location::Range(0, _) => 0,
    _ => -2
  };
  println!("{n}");
}
"""
answer.doesCompile = true
answer.stdout = "5"
context = """
每个匹配分支从上到下依次尝试。第二和第三个模式都适用，因此使用第二个。
"""


[[questions]]
id = "f7c361e0-733a-4d48-9809-736e3c1e2b67"
type = "MultipleChoice"
prompt.prompt = """
考虑为 `Option` 类型实现的以下方法：

```
impl<T> Option<T> {
  fn unwrap_or(self, other: T) -> T {
    match self {
      Some(t) => t,
      None => other
    }
  }
}
```

以下哪句话最准确地描述了该函数的行为？
"""
answer.answer = "如果 `self` 中存在值则返回该值，否则返回 `other`"
prompt.distractors = [
  "如果 `self` 中存在值则返回包含该值的新 Option，否则返回 `other`",
  "如果 `self` 中没有值则将 `other` 插入 `self`",
  "如果 `self` 中存在值则返回该值的引用，否则返回 `other`"
]
context = """
该函数通过获取 `self` 的所有权来"解包" Option 并取出其中的值；如果不存在值，则回退返回 `other`。
这是标准库中真实存在的函数！
"""


