type = "MultipleChoice"
prompt.prompt = """
**程序 1：**

```ide
/// Returns the n-th largest element in a slice
fn find_nth<T: Ord + Clone>(elems: &[T], n: usize) -> T {
    elems.sort();
    let t = &elems[n];
    return t.clone();
}
```

以下修复方案（黄色高亮部分）中，哪个最符合以下三个标准：
1. 修复后的函数能通过 Rust 编译器，
2. 修复后的函数保留了原代码的意图，且
3. 修复后的函数不引入不必要的低效
"""
answer.answer = """
```ide
fn find_nth<T: Ord + Clone>(elems: &[T], n: usize) -> T {
    `[let mut elem_refs: Vec<&T> = elems.iter().collect();]`
    `[elem_refs.sort();]`
    let t = `[elem_refs[n]]`;
    return t.clone();
}
```
"""
prompt.distractors = [
"""
```ide
fn find_nth<T: Ord + Clone>(`[elems: &mut [T]]`, n: usize) -> T {
    elems.sort();
    let t = &elems[n];
    return t.clone();
}
```
""",
"""
```ide
fn find_nth<T: Ord + Clone>(elems: &[T], n: usize) -> T {
    `[let mut elems = elems.to_vec();]`
    elems.sort();
    let t = &elems[n];
    return t.clone();
}
```
""",
"""
```ide
fn find_nth<`[T: Ord]`>(`[mut elems: Vec<T>]`, n: usize) -> T {
    elems.sort();
    let t = `[elems.remove(n)]`;
    return `[t]`;
}
```
""",
]
context = """
`find_nth` 这类函数显然旨在作为只读函数，即提取输入序列的某个属性。任何修改或丢弃输入的方案都不符合原函数的意图，
即使它比创建辅助向量更高效。

创建 `Vec<&T>` 比创建 `Vec<T>` 更优，因为如果 `T` 较大，`elems.to_vec()` 的开销会很高。但如果我们知道 `T: Copy`，
那么 `to_vec` 相比于减少 `elems.sort()` 中的指针解引用次数会更优。
"""

