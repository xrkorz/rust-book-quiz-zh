context = """
通过将 `get_curve` 的定义内联到 `apply_curve` 中，借用检查器能够理解 `self.curve` 不是 `self.scores`，
从而允许函数编译通过。这是解决此类借用检查器局限性的常见变通方法。

另一种选择是利用 `self.curve` 复制开销极低的特性，使用 [`Option::copied`](https://doc.rust-lang.org/std/option/enum.Option.html#method.copied)，
