id = "3ee8d846-d282-4de1-8e83-5ca0bc44fc13"
type = "MultipleChoice"
prompt.prompt = """
**程序 1：**

```ide
/// Returns the n-th largest element in a slice
fn find_nth<T: Ord + Clone>(elems: &[T], n: usize) -> T {
    elems.sort();
    let t = &elems[n];
    return t.clone();
}
```

通常情况下，尝试编译此函数时，编译器会返回如下错误：

```text
error[E0596]: cannot borrow `*elems` as mutable, as it is behind a `&` reference
 --> test.rs:3:5
  |
3 |     elems.sort();
  |     ^^^^^^^^^^^^ `elems` is a `&` reference, so the data it refers to cannot be borrowed as mutable
```

假设编译器没有拒绝此函数，以下哪些程序（如果有的话）会
（1）通过编译器，且（2）在执行时可能引发未定义行为？
请勾选满足两个条件的程序，如果没有则勾选"以下程序均不满足"。
"""
answer.answer = ["以下程序均不满足"]
prompt.distractors = [
"""
```
let v = vec![5, 4, 3, 2, 1];
find_nth(&v, 10);
```
""",
"""
```
let v = vec![5, 4, 3, 2, 1];
find_nth(&v, 0);
println!("{}", v[0]);
```
""",
"""
```
let v = vec![5, 4, 3, 2, 1];
let n = &v[0];
find_nth(&v, 0);
println!("{}", n);
```
""",
]
context = """
此程序在技术上是内存安全的，因为 `slice::sort` 只能移动元素，而不能释放它们。例如，即使调用 `find_nth` 后 `&v[0]` 指向的不是*原来的*数字，
也能保证指向*某个*数字。

注意 `find_nth(&v, 10)` 不会导致未定义行为，因为 Rust 会对数组访问进行边界检查，所以 `&v[10]` 会触发 panic。
"""


