id = "dcb42a15-d9b7-437d-95ec-f000b64ce277"
type = "MultipleChoice"
prompt.prompt = """
**程序 2：**

```ide
struct TestResult {
    /// Student's scores on a test
    scores: Vec<usize>,

    /// A possible value to curve all scores
    curve: Option<usize>
}
impl TestResult {
    pub fn get_curve(&self) -> &Option<usize> {
        &self.curve
    }

    /// If there is a curve, then increments all
    /// scores by the curve
    pub fn apply_curve(&mut self) {
        if let Some(curve) = self.get_curve() {
            for score in self.scores.iter_mut() {
                *score += *curve;
            }
        }
    }
}
```

通常情况下，尝试编译此函数时，编译器会返回如下错误：

```text
error[E0502]: cannot borrow `self.scores` as mutable because it is also borrowed as immutable
  --> test.rs:17:26
   |
16 |         if let Some(curve) = self.get_curve() {
   |                              ---------------- immutable borrow occurs here
17 |             for score in self.scores.iter_mut() {
   |                          ^^^^^^^^^^^^^^^^^^^^^^ mutable borrow occurs here
18 |                 *score += *curve;
   |                           ------ immutable borrow later used here
```

假设编译器没有拒绝此函数，以下哪些程序（如果有的话）会
（1）通过编译器，且（2）在执行时可能引发未定义行为？
请勾选满足两个条件的程序，如果没有则勾选"以下程序均不满足"。
"""
answer.answer = ["以下程序均不满足"]
prompt.distractors = [
"""
```
let mut result = TestResult {
    scores: vec![20, 50, 30],
    curve: Some(10)
};
result.apply_curve();
```
""",
"""
```
let mut result = TestResult {
    scores: vec![20, 50, 30],
    curve: Some(10)
};
let x = &result.scores[0];
result.apply_curve();
println!("{}", x);
```
""",
"""
```
let mut result = TestResult {
    scores: vec![20, 50, 30],
    curve: Some(10)
};
result.apply_curve();
println!("{:?}", result.scores);
```
""",
]
context = """
该程序实际上是安全的。借用检查器无法理解 `get_curve` 只借用了 `curve` 而不影响 `scores`，这是其局限性。
但理论上，如果 `get_curve` 被修改为返回与 `self.scores` 相关的引用，内存安全可能会被破坏。
"""

