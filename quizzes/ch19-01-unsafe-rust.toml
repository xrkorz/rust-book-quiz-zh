[[questions]]
id = "05a7959b-4fe7-4ee6-9c25-bfa9a4e72535"
type = "MultipleChoice"
prompt.prompt = """
以下哪些是 Rust 在 `unsafe` 块中启用的"超能力"？
"""
answer.answer = [
    "解引用裸指针",
    "调用标记为 `unsafe` 的函数",
]
prompt.distractors = [
    "禁用借用检查器",
    "将引用转换为裸指针",
]
context = """
`unsafe` 块允许你解引用裸指针并调用 `unsafe` 函数。但是，
`unsafe` 不会禁用借用检查器（对安全引用的操作仍然会被检查）。
引用可以在普通安全代码中转换为裸指针。
"""


[[questions]]
id = "7d50567d-d73c-47d4-922f-480e8d1b7919"
type = "Tracing"
prompt.program = """
fn main() {
    let mut v = Vec::with_capacity(4);
    for i in 0 .. 3 {
        v.push(i);
    }
    let n = &v[0] as *const i32;
    v.push(4);
    println!("{}", unsafe { *n });
}
"""
answer.doesCompile = true
answer.stdout = "0"
context = """
这个程序很危险！它能正确编译并执行没有问题，
因为 `Vec` 有足够的容量，`v.push(4)` 不会导致重新分配。但是，
如果容量为 3，则 `n` 会指向已释放的内存。
"""

[[questions]]
id = "015941ed-d375-4070-a8dc-2f368584b302"
type = "MultipleChoice"
prompt.prompt = """
以下哪些情况使用 `unsafe` 代码（或对 `unsafe` 代码的安全封装）
是绕过借用检查器的惯用方法？
"""
answer.answer = [
    "获取数组中不相交索引的两个可变引用",
    "允许值在未被读取时处于未初始化状态",
    "让一个结构体的某个字段中存放指向同一结构体另一个字段的引用"
]
prompt.distractors = [
    "将指向栈分配变量的指针从函数中返回",
]
context = """
获取不相交索引的两个可变引用是合理的，因为借用检查器无法理解索引何时不相交。参见：[`slice::split_at_mut`](https://doc.rust-lang.org/stable/std/primitive.slice.html#method.split_at_mut)。

允许值处于未初始化状态是合理的，因为借用检查器采用保守策略，要求值始终已初始化，但有时使用未初始化的值是有用的。参见 [`MaybeUninit`](https://doc.rust-lang.org/stable/std/mem/union.MaybeUninit.html) 和 [`take_mut`](https://docs.rs/take_mut/0.2.2/take_mut/index.html) crate。

让结构体持有对自身的引用是合理的，因为借用检查器无法推断自引用的生命周期。参见 [`std::pin`](https://doc.rust-lang.org/stable/std/pin/index.html) 模块。

然而，将指向栈分配变量的指针返回*永远*不能通过 unsafe 代码实现。
唯一合适的解决方案是使用垃圾回收，例如返回 `Rc<T>` 而不是 `&T`。
"""
