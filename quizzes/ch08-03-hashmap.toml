[[questions]]
id = "6028c7f5-b373-475f-ba43-553773c7b3b7"
type = "Tracing"
prompt.program = """
use std::collections::HashMap;
fn main() {
  let mut h: HashMap<char, Vec<usize>> = HashMap::new();
  for (i, c) in "hello!".chars().enumerate() {
    h.entry(c).or_insert(Vec::new()).push(i);
  }
  let mut sum = 0;
  for i in h.get(&'l').unwrap() {
    sum += *i;
  }
  println!("{}", sum);
}
"""
answer.doesCompile = true
answer.stdout = "5"
context = """
该程序将给定字母每次出现的索引存储为向量，并存入哈希映射中。
然后对字母 'l' 的所有索引求和，字母 'l' 在字符串 `"hello!"` 中出现在索引 2 和 3 处。
"""
