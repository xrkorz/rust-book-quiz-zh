context = """
任何需要分配新向量的策略（无论是通过 `Vec::clone` 还是 `Vec::new`）都会引入不必要的额外分配。
因此最简单有效的策略是只迭代索引 `0 .. v.len()`，这不会借用 `v`。我们以逆序执行，
以避免在删除时出现索引错位的问题。

与问题 1 类似，最符合惯用法的策略实际上是使用我们尚未讨论的内置函数
[`Vec::retain`](https://doc.rust-lang.org/std/vec/struct.Vec.html#method.retain)。
该函数只保留向量中满足谓词的元素，且内存效率更高。
"""

