id = "dd1bd092-ef8d-4293-a4d6-6a59b5887e98"
type = "MultipleChoice"
prompt.prompt = """
**程序 1：**

```ide
/// Removes all the zeros in-place from a vector of integers.
fn remove_zeros(v: &mut Vec<i32>) {
    for (i, t) in v.iter().enumerate().rev() {
        if *t == 0 {
            v.remove(i);
            v.shrink_to_fit();
        }
    }
}
```

通常如果你尝试编译此函数，编译器会返回以下错误：

```text
error[E0502]: cannot borrow `*v` as mutable because it is also borrowed as immutable
 --> test.rs:5:13
  |
3 |     for (i, t) in v.iter().enumerate().rev() {
  |                   --------------------------
  |                   |
  |                   immutable borrow occurs here
  |                   immutable borrow later used here
4 |         if *t == 0 {
5 |             v.remove(i);
  |             ^^^^^^^^^^^ mutable borrow occurs here
```

假设编译器没有拒绝此函数。以下哪些程序（如果有的话）会
（1）通过编译，且（2）在执行时可能导致未定义行为？
勾选满足两个条件的程序，如果没有则勾选"以上程序均不满足"。
"""
answer.answer = [
"""
```
let mut v = vec![5, 5, 0];
remove_zeros(&mut v);
println!("{:?}", v);
```
""",
"""
```
let mut v = vec![1, 2, 0, 3];
remove_zeros(&mut v);
```
""",
]
prompt.distractors = [
"""
```
let mut v = vec![1; 100];
remove_zeros(&mut v);
```
""",
"以上程序均不满足",
]
context = """
要违反内存安全，`remove_zeros` 必须以包含第一个元素之后存在零的向量来调用。
调用 `v.shrink_to_fit()` 会释放向量拥有的内存（由于调整大小），这将使包含指向旧数据指针的迭代器 `v.iter()` 失效。
注意，在调用 `remove_zeros` 后读取向量 `v` 并不是安全性违规的必要条件，因为问题出在 `remove_zeros` 内部。
"""

