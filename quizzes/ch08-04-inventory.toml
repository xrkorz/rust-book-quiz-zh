id = "fb0e3080-7cc8-4338-948e-fae693d137c8"
type = "MultipleChoice"
prompt.prompt = """
**程序 2：**

```ide
/// Reverses the elements of a vector in-place
fn reverse(v: &mut Vec<String>) {
    let n = v.len();
    for i in 0 .. n / 2 {
        std::mem::swap(&mut v[i], &mut v[n - i - 1]);
    }
}
```

如果尝试编译此程序，以下哪个选项最能描述你会得到的编译器错误？
"""
answer.answer = "无法对 `v[i]` 和 `v[n - i - 1]` 两次可变借用 `v`"
prompt.distractors = [
  "当 `v` 是可变借用时，无法对 `v.len()` 进行不可变借用",
  "无法对可变向量的元素 `v[i]` 进行可变借用"
]
context = """
编译器不会考虑用于访问数组的索引的具体值，因此 `&mut v[i]` 和 `&mut v[n - i - 1]` 被认为可能引用同一个元素。
因此会出现 `v` 不能被两次可变借用的错误。
"""


