context = """
当借用检查器拒绝了一个实际上安全且无其他变通方案的操作时，如果对避免分配有严格要求，
unsafe 代码有时是可以接受的。
在这个具体案例中，你实际上应该使用 [`Vec::swap`](https://doc.rust-lang.org/std/vec/struct.Vec.html#method.swap)，
它内部就是用经过严格测试的类似 unsafe 代码实现的。
