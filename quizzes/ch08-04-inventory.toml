[[questions]]
id = "867e5d29-c1eb-44b3-99e3-bb2325b74e44"
type = "MultipleChoice"
prompt.prompt = """
**程序 1：**

```ide
/// Removes all the zeros in-place from a vector of integers.
fn remove_zeros(v: &mut Vec<i32>) {
    for (i, t) in v.iter().enumerate().rev() {
        if *t == 0 {
            v.remove(i);
            v.shrink_to_fit();
        }
    }
}
```

如果尝试编译此函数，以下哪个选项最能描述你会得到的编译器错误？
"""
answer.answer = "`v.remove(i)` 无法将 `v` 借用为可变"
prompt.distractors = [
  "`v` 的生命周期不够长，无法调用 `v.remove(i)`",
  "当 `i` 有效时，`t` 无法被解引用",
  "`v.iter()` 无法在可变引用上调用"
]
context = """
函数 `v.iter()` 在 for 循环期间对向量 `v` 进行不可变借用。然而，`v.remove(i)` 需要对 `v` 的可变引用。
因此 `v.remove(i)` 无法将 `v` 借用为可变，因为这会与迭代器产生冲突。
"""


