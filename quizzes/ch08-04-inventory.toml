id = "4c703871-3cc3-483f-beb5-876bdbcd223b"
type = "MultipleChoice"
prompt.prompt = """
**程序 2：**

```ide
/// Reverses the elements of a vector in-place
fn reverse(v: &mut Vec<String>) {
    let n = v.len();
    for i in 0 .. n / 2 {
        std::mem::swap(&mut v[i], &mut v[n - i - 1]);
    }
}
```

通常如果你尝试编译此函数，编译器会返回以下错误：

```text
error[E0499]: cannot borrow `*v` as mutable more than once at a time
 --> test.rs:5:40
  |
5 |         std::mem::swap(&mut v[i], &mut v[n - i - 1]);
  |         --------------      -          ^ second mutable borrow occurs here
  |         |                   |
  |         |                   first mutable borrow occurs here
  |         first borrow later used by call
```

假设编译器没有拒绝此函数。以下哪些程序（如果有的话）会
（1）通过编译，且（2）在执行时可能导致未定义行为？
勾选满足两个条件的程序，如果没有则勾选"以上程序均不满足"。
"""
answer.answer = ["以上程序均不满足"]
prompt.distractors = [
"""
```
let mut v = vec![String::from("a"), String::from("b")];
let x = &v[0];
reverse(&mut v);
println!("{x}");
```
""",
"""
```
let mut v = vec![String::from("a"), String::from("b")];
reverse(&mut v);
```
""",
"""
```
let mut v = vec![String::from("a"), String::from("b")];
reverse(&mut v);
println!("{:?}", v);
```
""",
]
context = """
此函数不会导致内存安全违规，因为对所有 `i` 而言 `i != n - i - 1`，所以两个可变引用始终引用不同的元素。
注意，`let x = &v[0]` 的程序不会编译，因为 Rust 的借用检查器不允许在 `x` 有效期间调用 `reverse`。
"""

