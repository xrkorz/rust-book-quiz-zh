id = "2c6d6e2e-ad6e-4e98-bf88-8cada144ebee"
type = "MultipleChoice"
prompt.prompt = """
**程序 1：**

```ide
/// 将一个实现了 Display 的对象添加到
/// Display trait 对象的 vector 中
use std::fmt::Display;
fn add_displayable<T: Display>(
    v: &mut Vec<Box<dyn Display>>,
    t: T
) {
    v.push(Box::new(t));
}
```

如果你尝试编译此程序，以下哪项最准确地描述了编译器错误？
"""
answer.answer = "将类型 `T` 转换为 trait 对象时，其生命周期不够长"
prompt.distractors = [
  "类型 `T` 可能是动态大小类型，无法转换为 trait 对象",
  "如果类型 `T` 包含引用，则无法被装箱",
  "类型 `T` 的生命周期不超过引用 `&mut Vec<..>` 的生命周期"
]
context = """
将 `Box<T>` 转换为 `Box<dyn Display>`（在 `v.push(..)` 中隐式发生）时，Rust 要求 trait 对象 `dyn Display` 的生命周期必须超过 vector。然而，`T` 的生命周期未作指定，因此 `T` 的存活时间可能不够长。
"""


[[questions]]
id = "36da4652-baeb-47a6-9ee1-1448b02cbe8e"
type = "MultipleChoice"
prompt.prompt = """
**程序 1：**

```ide
/// 将一个实现了 Display 的对象添加到
/// Display trait 对象的 vector 中
use std::fmt::Display;
fn add_displayable<T: Display>(
    v: &mut Vec<Box<dyn Display>>,
    t: T
) {
    v.push(Box::new(t));
}
```

通常情况下，如果你尝试编译此函数，编译器会返回以下错误：

```text
error[E0310]: the parameter type `T` may not live long enough
 --> test.rs:6:12
  |
6 |     v.push(Box::new(t));
  |            ^^^^^^^^^^^
```

假设编译器*没有*拒绝此函数。以下哪些程序会（1）通过编译器，且（2）执行时可能引发未定义行为？勾选满足两个条件的程序，若都不满足则勾选"以上程序都不是"。"""
answer.answer = [
"""
```
let mut v: Vec<Box<dyn Display>> = Vec::new();
{
    let n = 0;
    add_displayable(&mut v, &n);
}
println!("{}", v[0]);
```
""",
]
prompt.distractors = [
  "以上程序都不是",
"""
```
let mut v: Vec<Box<dyn Display>> = Vec::new();
{
    let s = String::from("Hello world");
    add_displayable(&mut v, s);
}
println!("{}", v[0]);
```
""",
"""
```
let mut v: Vec<Box<dyn Display>> = Vec::new();
add_displayable(&mut v, 5);
```
"""
]
context = """
该程序存在内存不安全。要造成内存安全违规，程序必须创建一个包含引用的类型 `T`，且这些引用的生命周期短于 vector。例如，添加 `&n`，而 `n` 在 `v` 之前离开作用域，这意味着后续使用 `v[0]` 时会读取已释放的内存。
"""


