type = "MultipleChoice"
prompt.prompt = """
**程序 1：**

```ide
/// 将一个实现了 Display 的对象添加到
/// Display trait 对象的 vector 中
use std::fmt::Display;
fn add_displayable<T: Display>(
    v: &mut Vec<Box<dyn Display>>,
    t: T
) {
    v.push(Box::new(t));
}
```

在以下修复方案（黄色高亮显示）中，哪个方案最能同时满足以下三个标准：
1. 修复后的函数能通过 Rust 编译器，
2. 修复后的函数保留了原始代码的意图，且
3. 修复后的函数不引入不必要的低效
"""
answer.answer = """
```ide
fn add_displayable<`['a]`, T: Display `[+ 'a]`>(
    v: &mut Vec<Box<dyn Display `[+ 'a]`>>,
    t: T
) {
    v.push(Box::new(t));
}
```
"""
prompt.distractors = [
"""
```ide
fn add_displayable<T: Display `[+ 'static]`>(
    v: &mut Vec<Box<dyn Display>>,
    t: T
) {
    v.push(Box::new(t));
}
```
""",
"""
```ide
fn add_displayable<T: Display `[+ Clone]`>(
    v: &mut Vec<Box<dyn Display>>,
    t: T
) {
    v.push(Box::new(`[t.clone()]`));
}
```
""",
"""
```ide
fn add_displayable<`['a]`, T: Display `[+ 'a]`>(
    v: &`['a]` mut Vec<Box<dyn Display>>,
    t: T
) {
    v.push(Box::new(t));
}
```
""",
]
context = """
最惯用的修复方式是指定 `T` 的生命周期与 trait 对象 `dyn Display` 的生命周期之间的关系。这里的做法是：添加生命周期参数 `'a`，要求 `T` 的生命周期超过 `'a`，且 trait 对象的生命周期也至少为 `'a`。

使用 `'static` 约束虽然效果相同，但更差：它的表达能力更弱，使得 vector 中的 trait 对象永远不能持有引用。将生命周期 `'a` 放在 `&'a mut Vec<..>` 引用上是不正确的，也无法修复编译器错误。
"""
