[[questions]]
id = "d19f9e83-d4c2-41d5-9fc7-81db5135eb1e"
type = "MultipleChoice"
prompt.prompt = """
在本节的运行示例中，博客文章可以处于三种状态之一：`Draft`、`PendingReview` 和 `Published`。在示例中，每个状态被表示为一个结构体，状态转换被表示为返回 trait 对象的 trait 方法。

另一种实现方式是将状态表示为枚举，如下所示：

```
enum BlogState {
    Draft,
    PendingReview,
    Published
}

impl Post {
    fn request_review(&mut self) {
        use BlogState::*;
        self.state = match self.state {
            Draft => PendingReview,
            PendingReview => PendingReview,
            Published => Published
        }
    }
}
```

以下哪些是优先选择结构体/trait 表示方式而非枚举表示方式的合理理由？
"""
answer.answer = [
    "API 使用者可以向系统中添加新状态",
    "添加新状态无需修改其他所有状态上的方法"
]
prompt.distractors = [
    "`match` 在运行时比动态分发慢",
    "API 使用者可以为系统中的所有状态添加新方法"
]
context = """
结构体/trait 方式的可扩展性体现在：API 使用者可以在不改动核心 API 功能的前提下创建新状态（例如 `Retracted`）。添加新状态时，其他状态的方法无需修改。而使用枚举时，使用者无法向枚举中添加新分支，且每次添加状态都必须更新所有 `match` 表达式。

`match` 不太可能比动态分发慢。`match` 是基于枚举标签的简单分支，而动态分发需要通过 trait 对象的虚表进行一层间接调用（且函数调用无法内联）。

在结构体/trait 方式中，API 使用者无法为现有状态添加新*方法*，只能添加新状态。方法由 API 作者的 trait 定义所固定。注意，可以通过扩展 trait 添加仅依赖现有方法的新方法，例如：

```
trait StateExt {
    fn request_review_twice(self: Box<Self>) -> Box<dyn State>;
}

impl<S: State> StateExt for S {
    fn request_review_twice(self: Box<Self>) -> Box<dyn State> {
        self.request_review().request_review()
    }
}
```

但这些扩展无法读取状态的私有数据。
"""
