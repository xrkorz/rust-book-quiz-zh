[[questions]]
id = "a91417cd-cd6d-416b-b72d-4af6b3fb2fd6"
type = "MultipleChoice"
prompt.prompt = """
如果一个引用拥有生命周期 `'static`，这意味着：
"""
answer.answer = "该引用指向的数据永远不会被释放"
prompt.distractors = [
  "该引用指向的数据不可被修改",
  "该引用指向的数据存储在内存的静态区域",
  "该引用指向的数据不是动态的"
]
context = """
`'static` 意味着"在整个程序运行期间都存活"，因此静态引用指向的数据永远不会被释放。虽然在实践中 `'static` 引用通常不可变，
但 `'static` 生命周期的含义与可变性并无本质关联。
"""

[[questions]]
id = "e521409a-6cbd-48f5-bee0-7fa7f17cc562"
type = "MultipleChoice"
prompt.prompt = """
考虑以下未添加注解的函数签名。

```
struct Foo<'a> {
  bar: &'a i32
}

fn baz(f: Foo) -> &i32 { /* ... */ }
```

Rust 会接受这个函数签名吗？如果会，它将推断出什么生命周期？
"""
answer.answer = """
```
fn baz<'a>(f: Foo<'a>) -> &'a i32
```
  """
prompt.distractors = [
  "Rust 将拒绝此函数签名",
  """
```
fn baz(f: Foo) -> &i32
```
  """,
  """
```
fn baz<'a>(f: Foo<'a>) -> &i32
```
  """,
  """
```
fn baz<'a>(f: Foo) -> &'a i32
```
  """,

]
prompt.answerIndex = 4
context = """
该结构体接受单个生命周期参数，输出也只有单个生命周期，因此 Rust 认为它们相同。
"""

[[questions]]
id = "d03748df-8dcf-4ec8-bd30-341927544665"
type = "MultipleChoice"
prompt.prompt = """
考虑以下未添加注解的函数签名。

```
struct Foo<'a> {
  bar: &'a i32
}

// Foo 改为 &Foo
fn baz(f: &Foo) -> &i32 { /* ... */ }
```

Rust 会接受这个函数签名吗？如果会，它将推断出什么生命周期？
"""
answer.answer = "Rust 将拒绝此函数签名"
prompt.distractors = [
  """
```
fn baz(f: &Foo) -> &i32
```
  """,
  """
```
fn baz<'a>(f: &Foo<'a>) -> &'a i32
```
  """,
  """
```
fn baz<'a>(f: &'a Foo) -> &'a i32
```
  """,
  """
```
fn baz<'a, 'b>(f: &'a Foo<'b>) -> &'a i32
```
  """,
  """
```
fn baz<'a, 'b>(f: &'a Foo<'b>) -> &'b i32
```
  """
]
prompt.answerIndex = 0
context = """
Rust 不会编译此程序，因为输出的生命周期是与 `&Foo` 的生命周期还是与 `Foo.bar` 的引用生命周期相关联存在歧义。
"""
