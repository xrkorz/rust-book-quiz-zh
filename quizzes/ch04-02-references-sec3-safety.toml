[[questions]]
id = "5080616f-6f4c-43f7-aa3a-8b23f2798937"
type = "Tracing"
prompt.program = """
fn incr(n: &mut i32) {
  *n += 1;
}

fn main() {
  let mut n = 1;
  incr(&n);
  println!("{n}");
}
"""
answer.doesCompile = false
answer.lineNumber = 7
context = """
尽管 `n` 被标记为 `mut`，但传给 `incr` 的引用也必须标记为 `mut`。
因此该程序的正确写法应为 `incr(&mut n)`。
"""


