id = "44a2eb01-b49a-497b-a9d2-207814d1db1e"
type = "MultipleChoice"
prompt.prompt = """
**程序 1：**

```ide
/// 生成用于分隔文本行的字符串，
/// 如果提供的字符串为空则返回默认值
fn make_separator(user_str: &str) -> &str {
    if user_str == "" {
        let default = "=".repeat(10);
        &default
    } else {
        user_str
    }
}
```

通常情况下，如果你尝试编译这个函数，编译器会返回以下错误：

```text
error[E0515]: cannot return reference to local variable `default`
 --> test.rs:6:9
  |
6 |         &default
  |         ^^^^^^^^ returns a reference to data owned by the current function
```

假设编译器**没有**拒绝这个函数。以下哪些程序会（1）通过编译器，且（2）执行时可能导致未定义行为？
勾选满足这两个条件的程序，如果都不满足则勾选"以上程序均不满足"。
"""
answer.answer = ["""
```
let s = make_separator("");
println!("{s}");
```
"""]
prompt.distractors = [
"""
```
println!("{}", make_separator("Hello world!"));
```
""",
"以上程序均不满足",
]
context = """
调用者必须传入空字符串才能触发有问题的 if 分支。这会返回一个悬空指针。
"""

