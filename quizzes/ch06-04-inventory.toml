id = "3a8d5bb8-a204-43e6-b50a-d17c803dbe37"
type = "MultipleChoice"
prompt.prompt = """
**程序 2：**

```ide
/// 如果 option 中存在字符串则取出，
/// 否则返回默认值
fn get_or_default(arg: &Option<String>) -> String {
    if arg.is_none() {
        return String::new();
    }
    let s = arg.unwrap();
    s.clone()
}
```

在以下修复方案（用黄色高亮显示）中，哪个方案最符合以下三个标准：
1. 修复后的函数能通过 Rust 编译器，
2. 修复后的函数保留了原始代码的意图，
3. 修复后的函数不引入不必要的性能损耗
"""
answer.answer = """
```ide
fn get_or_default(arg: &Option<String>) -> String {
    `[match arg {]`
        `[None => String::new(),]`
        `[Some(s) => s.clone()]`
    `[}]`
}
```
"""
prompt.distractors = [
"""
```ide
fn get_or_default(arg: `[&mut Option<String>]`) -> String {
    if arg.is_none() {
        return String::new();
    }
    let s = arg`[.as_mut()]`.unwrap();
    s.clone()
}
```
""",
"""
```ide
fn get_or_default(arg: `[Option<String>]`) -> String {
    if arg.is_none() {
        return String::new();
    }
    let s = arg.unwrap();
    s.clone()
}
```
""",
"""
```ide
fn get_or_default(arg: &Option<`[&str]`>) -> String {
    if arg.is_none() {
        return String::new();
    }
    let s = arg.unwrap();
    `[s.to_string()]`
}
```
""",
]
context = """
`is_none` 和 `unwrap` 的组合在 Rust 中是反模式，因为 `match` 将二者的功能合而为一，
并自动将引用 `&Option` 推入内部以产生 `&String`。因此 `match` 方案最符合惯用法，
且无需更改函数的预期类型签名即可通过编译器。

将 `&Option` 改为 `Option` 的方案不可取，因为它要求调用者提供 option 的所有权，
这是更为严格的 API 限制。
"""
