id = "989670b2-b038-47c4-9975-a93d6ee193e5"
type = "MultipleChoice"
prompt.prompt = """
**程序 2：**

```ide
/// 如果 option 中存在字符串则取出，
/// 否则返回默认值
fn get_or_default(arg: &Option<String>) -> String {
    if arg.is_none() {
        return String::new();
    }
    let s = arg.unwrap();
    s.clone()
}
```

通常情况下，如果你尝试编译这个函数，编译器会返回以下错误：

```text
error[E0507]: cannot move out of `*arg` which is behind a shared reference
   --> test.rs:7:13
    |
7   |     let s = arg.unwrap();
    |             ^^^^--------
    |             |   |
    |             |   `*arg` moved due to this method call
    |             help: consider calling `.as_ref()` or `.as_mut()` to borrow the type's contents
    |             move occurs because `*arg` has type `Option<String>`, which does not implement the `Copy` trait
```

假设编译器**没有**拒绝这个函数。以下哪些程序会（1）通过编译器，且（2）执行时可能导致未定义行为？
勾选满足这两个条件的程序，如果都不满足则勾选"以上程序均不满足"。
"""
answer.answer = [
"""
```
let opt = Some(String::from("Rust"));
get_or_default(&opt);
println!("{:?}", opt);
```
""",
"""
```
let opt = Some(String::from("Rust"));
let s = get_or_default(&opt);
println!("{}", s);
```
""",
"""
```
let opt = Some(String::from("Rust"));
get_or_default(&opt);
```
""",
]
prompt.distractors = [
"以上程序均不满足",
]
context = """
所有这些程序都因双重释放而违反内存安全。如果允许 `arg.unwrap()`，那么字符串 `String::from("Rust")` 的所有权
将被 `s` 获取。`get_or_default` 返回后，该字符串会被释放。然而 `opt` 也认为自己拥有该字符串，
因此字符串会被再次释放。
"""

