id = "815ae4cd-0f23-4da5-9dc2-0e81c664cc28"
type = "MultipleChoice"
prompt.prompt = """
**程序 1：**

```ide
/// 生成用于分隔文本行的字符串，
/// 如果提供的字符串为空则返回默认值
fn make_separator(user_str: &str) -> &str {
    if user_str == "" {
        let default = "=".repeat(10);
        &default
    } else {
        user_str
    }
}
```

在以下修复方案（用黄色高亮显示）中，哪个方案最符合以下三个标准：
1. 修复后的函数能通过 Rust 编译器，
2. 修复后的函数保留了原始代码的意图，
3. 修复后的函数不引入不必要的性能损耗
"""
answer.answer = """
```ide
fn make_separator(user_str: &str) -> `[String]` {
    if user_str == "" {
        let default = "=".repeat(10);
        `[default]`
    } else {
        `[user_str.to_string()]`
    }
}
```
"""
prompt.distractors = [
"""
```ide
fn make_separator(user_str: &str) -> &str {
    if user_str == "" {
        let default = "=".repeat(10);
        &default
    } else {
        `[&user_str]`
    }
}
```
""",
"""
```ide
fn make_separator(user_str: `[String]`) -> `[String]` {
    if user_str == "" {
        let default = "=".repeat(10);
        `[default]`
    } else {
        user_str
    }
}
```
""",
]
context = """
没有有效的方法可以返回指向栈上分配变量的指针。因此简单的解决方案是将返回类型改为 `String`，
并将输入 `user_str` 复制为拥有所有权的字符串。然而，要求 `user_str` 为 `String` 会降低 API 的灵活性，
例如调用者无法对更大字符串的子串调用 `make_separator`，也必须在堆上分配字符串，
无法使用字符串字面量如 `make_separator("Rust")`。

该问题最符合惯用法的解决方案使用了一种你还未见过的构造：[`Cow`](https://doc.rust-lang.org/std/borrow/enum.Cow.html)。
写时克隆智能指针可以让该函数在没有类型错误的情况下返回*拥有所有权的字符串*或*字符串引用*。
"""

