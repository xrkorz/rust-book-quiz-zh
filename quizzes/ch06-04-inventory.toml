id = "1f4e5c06-ecdf-481d-9cae-8a25dafe9cfd"
type = "MultipleChoice"
prompt.prompt = """
**程序 2：**

```ide
/// 如果 option 中存在字符串则取出，
/// 否则返回默认值
fn get_or_default(arg: &Option<String>) -> String {
    if arg.is_none() {
        return String::new();
    }
    let s = arg.unwrap();
    s.clone()
}
```

如果你尝试编译这个函数，以下哪项最能描述你会遇到的编译器错误？
"""
answer.answer = "cannot move out of `arg` in `arg.unwrap()`"
prompt.distractors = [
  "cannot call `arg.is_none()` without dereferencing `arg`",
  "`arg` does not live long enough",
  "cannot return `s.clone()` which does not live long enough"
]
context = """
函数 `Option::unwrap` 期望 `self`，即需要 `arg` 的所有权。然而 `arg` 是对 option 的不可变引用，
无法提供该 option 的所有权。因此编译器报错，说我们无法通过 `unwrap` 移出 `arg`。
"""


